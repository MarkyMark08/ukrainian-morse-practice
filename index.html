<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukrainian Morse Code Practice</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        text-align: center;
    }

    #question {
        font-size: 2rem;
        margin: 20px 0;
    }

    input {
        font-size: 1.2rem;
        padding: 8px;
        width: 120px;
        text-align: center;
    }

    button {
        font-size: 1.1rem;
        padding: 8px 16px;
        margin-left: 10px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        font-size: 1.2rem;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>Ukrainian Morse Code Practice</h1>

<div id="question"></div>

<input type="text" id="answer" autofocus>
<button id="submit">Submit</button>

<div id="result"></div>

<script>
const dataset = {
    "•-":"А",
    "-•••":"Б",
    "•--":"В",
    "••••":"Г",
    "--•":"Ґ",
    "-••":"Д",
    "•":"Е",
    "••-••":"Є",
    "•••-":"Ж",
    "--••":"З",
    "-•--":"И",
    "••":"І",
    "•---•":"Ї",
    "•---":"Й",
    "-•-":"К",
    "•-••":"Л",
    "--":"М",
    "-•":"Н",
    "---":"О",
    "•--•":"П",
    "•-•":"Р",
    "•••":"С",
    "-":"Т",
    "••-":"У",
    "••-•":"Ф",
    "----":"Х",
    "-•-•":"Ц",
    "---•":"Ч",
    "--•-":"Ш",
    "--•--":"Щ",
    "••--":"Ю",
    "•-•-":"Я",
    "-••-":"Ь"
};

let dataList = Object.entries(dataset);

// Fisher-Yates shuffle
for (let i = dataList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [dataList[i], dataList[j]] = [dataList[j], dataList[i]];
}

let currentIndex = 0;

const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const resultEl = document.getElementById("result");
const submitBtn = document.getElementById("submit");

function showQuestion() {
    if (currentIndex >= dataList.length) {
        questionEl.textContent = "🎉 Practice Complete!";
        answerEl.style.display = "none";
        submitBtn.style.display = "none";
        resultEl.textContent = "";
        return;
    }

    questionEl.textContent = dataList[currentIndex][0];
    answerEl.value = "";
    answerEl.focus();
}

function checkAnswer() {
    const [question, correctAnswer] = dataList[currentIndex];
    const userAnswer = answerEl.value.trim();

    if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
        resultEl.textContent = "✅ правильно";
        resultEl.style.color = "green";
    } else {
        resultEl.textContent = `❌ Не правильно : ${correctAnswer}`;
        resultEl.style.color = "red";
    }

    currentIndex++;

    setTimeout(showQuestion, 1000);
}

submitBtn.addEventListener("click", checkAnswer);

answerEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        checkAnswer();
    }
});

showQuestion();
</script>

</body>
</html>
